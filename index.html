<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>FF26 — Meet List</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  html, body { background: #000; color: #fff; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif; }
  body { min-height: 100vh; padding-bottom: env(safe-area-inset-bottom); }

  header {
    position: sticky; top: 0; z-index: 10;
    background: rgba(0,0,0,0.85);
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
    padding: 14px 16px 10px;
    border-bottom: 1px solid #222;
  }
  header .title-row {
    display: flex; align-items: baseline; justify-content: space-between;
    margin-bottom: 10px;
  }
  header h1 { font-size: 17px; font-weight: 700; letter-spacing: -0.2px; }
  header .stats { font-size: 12px; color: #888; font-variant-numeric: tabular-nums; }
  .filters {
    display: flex; gap: 6px; overflow-x: auto;
    scrollbar-width: none; -webkit-overflow-scrolling: touch;
  }
  .filters::-webkit-scrollbar { display: none; }
  .filter-btn {
    flex-shrink: 0;
    background: #1a1a1a; color: #ccc;
    border: 1px solid #2a2a2a;
    padding: 6px 12px;
    border-radius: 16px;
    font-size: 12px; font-weight: 500;
    cursor: pointer; white-space: nowrap;
  }
  .filter-btn.active { background: #fff; color: #000; border-color: #fff; }
  .search {
    width: 100%;
    background: #1a1a1a; color: #fff;
    border: 1px solid #2a2a2a;
    padding: 8px 14px;
    border-radius: 16px;
    font-size: 13px; outline: none;
    margin-top: 8px;
  }
  .search::placeholder { color: #666; }

  /* Feed */
  .feed { padding: 12px; display: flex; flex-direction: column; gap: 12px; }

  .card {
    position: relative;
    width: 100%;
    aspect-ratio: 1;
    max-width: 600px;
    margin: 0 auto;
    border-radius: 20px;
    overflow: hidden;
    cursor: pointer;
    background: #1a1a1a;
    box-shadow: 0 4px 20px rgba(0,0,0,0.5);
    transition: transform 0.15s;
  }
  .card:active { transform: scale(0.98); }
  .card img {
    width: 100%; height: 100%;
    object-fit: cover; display: block;
  }
  .card .overlay {
    position: absolute; inset: 0;
    background: linear-gradient(180deg,
      rgba(0,0,0,0.6) 0%,
      rgba(0,0,0,0) 25%,
      rgba(0,0,0,0) 50%,
      rgba(0,0,0,0.9) 100%);
    display: flex; flex-direction: column; justify-content: space-between;
    padding: 18px 20px;
    pointer-events: none;
  }
  .card .top-info {
    display: flex; justify-content: space-between; align-items: flex-start;
    gap: 10px;
  }
  .card .company {
    background: rgba(255,255,255,0.18);
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
    padding: 6px 12px;
    border-radius: 12px;
    font-size: 13px;
    font-weight: 700;
    text-shadow: 0 1px 3px rgba(0,0,0,0.6);
    letter-spacing: 0.1px;
  }
  .card .tier-dot {
    width: 14px; height: 14px;
    border-radius: 50%;
    border: 2px solid rgba(255,255,255,0.7);
    box-shadow: 0 0 8px rgba(0,0,0,0.4);
    flex-shrink: 0;
  }
  .card .bottom-info {
    display: flex; flex-direction: column; gap: 6px;
  }
  .card .name {
    font-size: 24px;
    font-weight: 800;
    letter-spacing: -0.4px;
    text-shadow: 0 2px 6px rgba(0,0,0,0.8);
    line-height: 1.1;
  }
  .card .hook {
    display: inline-block;
    align-self: flex-start;
    background: rgba(255,255,255,0.95);
    color: #000;
    padding: 4px 10px;
    border-radius: 10px;
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 0.4px;
    text-transform: uppercase;
  }

  /* Modal */
  .modal-bg {
    position: fixed; inset: 0; z-index: 100;
    background: rgba(0,0,0,0.85);
    backdrop-filter: blur(8px);
    -webkit-backdrop-filter: blur(8px);
    display: none; align-items: flex-end; justify-content: center;
    animation: fadeIn 0.2s ease-out;
  }
  .modal-bg.show { display: flex; }
  @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
  @keyframes slideUp { from { transform: translateY(40px); } to { transform: translateY(0); } }

  .modal {
    width: 100%;
    max-width: 600px;
    max-height: 90vh;
    background: #111;
    border-radius: 24px 24px 0 0;
    overflow-y: auto;
    position: relative;
    border-top: 1px solid #333;
    animation: slideUp 0.25s ease-out;
  }
  @media (min-width: 700px) {
    .modal-bg { align-items: center; padding: 20px; }
    .modal { border-radius: 24px; max-height: 85vh; }
  }
  .modal .close {
    position: sticky; top: 14px;
    float: right; margin-right: 14px;
    background: rgba(255,255,255,0.12);
    backdrop-filter: blur(12px);
    border: none; color: #fff;
    width: 36px; height: 36px;
    border-radius: 50%; font-size: 22px; line-height: 1;
    cursor: pointer; z-index: 2;
    display: flex; align-items: center; justify-content: center;
  }
  .modal-hero {
    width: 100%;
    aspect-ratio: 1;
    background: #222;
    position: relative;
    overflow: hidden;
  }
  .modal-hero img { width: 100%; height: 100%; object-fit: cover; }
  .modal-hero .gradient {
    position: absolute; bottom: 0; left: 0; right: 0;
    height: 50%;
    background: linear-gradient(180deg, transparent, rgba(17,17,17,1));
    pointer-events: none;
  }
  .modal-body { padding: 0 24px 30px; margin-top: -60px; position: relative; }
  .modal h2 { font-size: 32px; font-weight: 800; letter-spacing: -0.5px; line-height: 1.05; margin-bottom: 6px; }
  .modal .modal-company { font-size: 16px; color: #94a3b8; margin-bottom: 12px; font-weight: 500; }
  .modal .tier-badge {
    display: inline-block;
    padding: 4px 12px;
    border-radius: 8px;
    font-size: 11px;
    font-weight: 700;
    color: #000;
    letter-spacing: 0.3px;
    margin-bottom: 24px;
  }
  .modal-body .row { margin-bottom: 20px; }
  .modal-body .label {
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 1.2px;
    color: #94a3b8;
    font-weight: 600;
    margin-bottom: 6px;
    display: block;
  }
  .modal-body p { font-size: 15px; line-height: 1.5; color: #e5e7eb; }
  .modal-body a { color: #60a5fa; text-decoration: none; word-break: break-all; }

  .empty {
    text-align: center;
    padding: 80px 20px;
    color: #555;
    font-size: 14px;
  }
</style>
</head>
<body>

<header>
  <div class="title-row">
    <h1>FF26 Meet List</h1>
    <div class="stats" id="stats"></div>
  </div>
  <div class="filters" id="filters">
    <button class="filter-btn active" data-tier="all">All</button>
    <button class="filter-btn" data-tier="1">🥇 Tier 1</button>
    <button class="filter-btn" data-tier="SF">🌉 SF Peers</button>
    <button class="filter-btn" data-tier="SF-network">🌉 SF Network</button>
    <button class="filter-btn" data-tier="2">🥈 Tier 2</button>
  </div>
  <input type="text" class="search" id="search" placeholder="Search name or company…">
</header>

<div class="feed" id="feed"></div>

<div class="modal-bg" id="modal" onclick="if(event.target===this)closeModal()">
  <div class="modal">
    <button class="close" onclick="closeModal()">&times;</button>
    <div id="modal-content"></div>
  </div>
</div>

rnG9oMTZ3JReZ//2Q==","note":"photo extraction blocked by LinkedIn auth wall (curl 999); use authenticated browser to fetch","hook":"Ubisoft","tier_label":"\ud83e\udd48 Tier 2","tier_color":"#86efac"}];
let activeFilter = 'all';
let searchTerm = '';

function escapeHtml(s) {
  if (!s) return '';
  return String(s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}

function render() {
  const feed = document.getElementById('feed');
  const filtered = DATA.filter(p => {
    if (activeFilter !== 'all' && p.tier !== activeFilter) return false;
    if (searchTerm) {
      const q = searchTerm.toLowerCase();
      return (p.name + ' ' + p.company + ' ' + (p.hook||'')).toLowerCase().includes(q);
    }
    return true;
  });

  document.getElementById('stats').textContent = filtered.length + ' / ' + DATA.length;

  if (filtered.length === 0) {
    feed.innerHTML = '<div class="empty">No matches.</div>';
    return;
  }

  feed.innerHTML = filtered.map(p => `
    <div class="card" onclick="openModal('${p.id}')">
      <img src="${escapeHtml(p.photo_url)}" alt="${escapeHtml(p.name)}" loading="lazy">
      <div class="overlay">
        <div class="top-info">
          <div class="company">${escapeHtml(p.company)}</div>
          <div class="tier-dot" style="background:${p.tier_color}" title="${escapeHtml(p.tier_label)}"></div>
        </div>
        <div class="bottom-info">
          ${p.hook ? `<span class="hook">${escapeHtml(p.hook)}</span>` : ''}
          <div class="name">${escapeHtml(p.name)}</div>
        </div>
      </div>
    </div>
  `).join('');
}

function openModal(id) {
  const p = DATA.find(x => x.id === id);
  if (!p) return;
  document.getElementById('modal-content').innerHTML = `
    <div class="modal-hero">
      <img src="${escapeHtml(p.photo_url)}" alt="${escapeHtml(p.name)}">
      <div class="gradient"></div>
    </div>
    <div class="modal-body">
      <h2>${escapeHtml(p.name)}</h2>
      <div class="modal-company">${escapeHtml(p.company)}</div>
      <span class="tier-badge" style="background:${p.tier_color}">${escapeHtml(p.tier_label)}</span>
      <div class="row">
        <span class="label">Stage / Raise</span>
        <p>${escapeHtml(p.stage || '—')}</p>
      </div>
      <div class="row">
        <span class="label">What they do</span>
        <p>${escapeHtml(p.tagline || '—')}</p>
      </div>
      <div class="row">
        <span class="label">Why meet</span>
        <p>${escapeHtml(p.why || '—')}</p>
      </div>
      ${p.linkedin_url ? `<div class="row"><span class="label">Profile</span><p><a href="${escapeHtml(p.linkedin_url)}" target="_blank">${escapeHtml(p.linkedin_url)}</a></p></div>` : ''}
      ${p.note ? `<div class="row"><span class="label">Note</span><p style="color:#888;font-size:13px;">${escapeHtml(p.note)}</p></div>` : ''}
    </div>
  `;
  document.getElementById('modal').classList.add('show');
  document.body.style.overflow = 'hidden';
}

function closeModal() {
  document.getElementById('modal').classList.remove('show');
  document.body.style.overflow = '';
}

document.addEventListener('keydown', e => { if (e.key === 'Escape') closeModal(); });

document.querySelectorAll('.filter-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    activeFilter = btn.dataset.tier;
    render();
    window.scrollTo({top: 0, behavior: 'smooth'});
  });
});

document.getElementById('search').addEventListener('input', e => {
  searchTerm = e.target.value;
  render();
});

render();
</script>
